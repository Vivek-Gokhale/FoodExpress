<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Add Restaurant</title>
</head>
<body>
    <div class="form-container" style="margin-top:50px;">
        <p class="title">Add Restaurant</p>
        <form class="form" method="post">
            <input type="text" class="input" name="name" placeholder="Restaurant Name" required autocomplete="off">
            <input type="email" class="input" name="email" placeholder="Email" required autocomplete="off">
            <input type="tel" class="input" name="phoneNo" placeholder="Phone Number" required autocomplete="off">
            
            <input type="date" class="input" name="registrationDate" 
                   th:value="${currentDate}" 
                   readonly style="background-color:#D3D3D3">
            
            <label for="startTime" style="font-size: 0.9rem;">Start Time</label>
            <input type="time" class="input" name="startTime" id="startTime" required>
            
            <label for="closeTime" style="font-size: 0.9rem;">Close Time</label>
            <input type="time" class="input" name="closeTime" id="closeTime" required>
            
            <button class="btn" type="submit">Add Restaurant</button>
        </form>
        
        <p class="sign-up-label" style="font-size:12px;">
            Back to <span class="sign-up-link"><a th:href="@{/index}">Dashboard</a></span>
        </p>
    </div>
    <script th:src="@{/javascript/addRestaurant.js}"></script>
</body>
</html>
